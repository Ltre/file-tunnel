<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>磁链缓存列表</title>
    <style>
        * { box-sizing: border-box; }
        html, body {
            width: 100%;
            overflow-x: hidden;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: #f4f6fb;
            color: #24304a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        main {
            width: min(94vw, 900px);
            max-width: 100%;
            margin: 0 auto;
            padding: 28px 0 42px;
        }
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 18px;
        }
        h1 { margin: 0; font-size: 1.35rem; }
        a, button {
            min-height: 38px;
            padding: 0 14px;
            border: 0;
            border-radius: 8px;
            background: #667eea;
            color: #fff;
            cursor: pointer;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }
        button.secondary, a.secondary {
            background: #edf1f7;
            color: #36445f;
        }
        .list {
            display: grid;
            gap: 12px;
        }
        .item {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 12px;
            align-items: center;
            padding: 16px;
            border: 1px solid #dfe5f1;
            border-radius: 10px;
            background: #fff;
            box-shadow: 0 10px 28px rgba(31, 45, 77, 0.08);
        }
        .name {
            font-weight: 800;
            margin-bottom: 6px;
            word-break: break-all;
        }
        .meta {
            color: #61708d;
            font-size: 0.9rem;
            line-height: 1.7;
            word-break: break-all;
        }
        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .magnet-loader {
            display: flex;
            gap: 8px;
            margin: 0 0 14px;
            align-items: center;
        }
        .magnet-loader input {
            flex: 1;
            min-width: 0;
            min-height: 38px;
            padding: 0 12px;
            border: 1px solid #cad3e2;
            border-radius: 8px;
            background: #fff;
            color: #24304a;
            font: inherit;
        }
        .empty {
            padding: 42px 20px;
            border: 1px dashed #cad3e2;
            border-radius: 10px;
            background: #fff;
            text-align: center;
            color: #61708d;
        }
        .inline-downloader {
            display: none;
            width: 100%;
            max-width: 100%;
            min-width: 0;
            margin: 0 0 14px;
            border: 1px solid #dfe5f1;
            border-radius: 10px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 10px 28px rgba(31, 45, 77, 0.08);
        }
        .inline-downloader.open {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            grid-template-rows: auto minmax(360px, 62vh);
        }
        .inline-downloader.minimized { grid-template-rows: auto; }
        .inline-downloader.minimized iframe { display: none; }
        .inline-downloader-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            min-width: 0;
            padding: 8px 10px;
            border-bottom: 1px solid #e6ebf4;
            color: #36445f;
            font-weight: 800;
        }
        #inlineDownloaderTitle {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .inline-downloader-actions { display: inline-flex; flex: 0 0 auto; gap: 6px; }
        .inline-downloader-actions button { min-height: 30px; padding: 0 10px; }
        .inline-downloader iframe {
            display: block;
            width: 100%;
            max-width: 100%;
            min-width: 0;
            height: 100%;
            border: 0;
        }
        @media (max-width: 640px) {
            header, .item {
                grid-template-columns: 1fr;
                display: grid;
            }
            .magnet-loader { display: flex; }
            .magnet-loader button { padding: 0 10px; white-space: nowrap; }
            .actions { justify-content: flex-start; }
        }
    </style>
</head>
<body>
<main>
    <header>
        <h1>磁链缓存列表</h1>
        <!-- 注释代码原因：点击后没有参数，显示页异常，因此无意义 -->
        <!-- <a class="secondary" href="/downloader">返回下载页</a> -->
    </header>
    <form id="magnetLoadForm" class="magnet-loader">
        <input id="magnetIdInput" type="text" inputmode="text" autocomplete="off" placeholder="输入完整磁链或磁链ID">
        <button type="submit">加载文件</button>
    </form>
    <section id="inlineDownloader" class="inline-downloader" aria-live="polite">
        <div class="inline-downloader-header">
            <span id="inlineDownloaderTitle">磁链下载</span>
            <span class="inline-downloader-actions">
                <button id="inlineDownloaderMinimize" type="button" title="隐藏下载页">-</button>
                <button id="inlineDownloaderClose" type="button" title="关闭下载页">x</button>
            </span>
        </div>
        <iframe id="inlineDownloaderFrame" title="磁链下载"></iframe>
    </section>
    <div id="list" class="list">
        <div class="empty">正在读取缓存...</div>
    </div>
</main>

<script>
(() => {
    const DB_NAME = 'TunnelDownloaderDB';
    const DB_VERSION = 1;
    const STORE_NAME = 'magnetFiles';
    const list = document.getElementById('list');
    const magnetLoadForm = document.getElementById('magnetLoadForm');
    const magnetIdInput = document.getElementById('magnetIdInput');
    const embedded = new URLSearchParams(location.search).get('embedded') === '1';
    const inlineDownloader = document.getElementById('inlineDownloader');
    const inlineDownloaderFrame = document.getElementById('inlineDownloaderFrame');
    const inlineDownloaderTitle = document.getElementById('inlineDownloaderTitle');
    const inlineDownloaderMinimize = document.getElementById('inlineDownloaderMinimize');
    const inlineDownloaderClose = document.getElementById('inlineDownloaderClose');
    if (embedded) document.querySelector('header a.secondary')?.remove();

    function normalizeMagnetInput(value) {
        const raw = String(value || '').trim();
        if (!raw) return '';
        try {
            const url = new URL(raw, location.origin);
            const queryId = url.searchParams.get('magnet');
            if (queryId) return queryId.trim();
            const match = url.pathname.match(/\/magnet\/([a-zA-Z0-9_-]{12,64})/);
            if (match) return match[1];
        } catch {}
        return raw.replace(/^magnet:/i, '').trim();
    }

    async function openInlineDownloader(magnetId) {
        inlineDownloader.classList.add('open');
        inlineDownloader.classList.remove('minimized');
        inlineDownloaderMinimize.textContent = '-';
        inlineDownloaderTitle.textContent = '正在校验磁链...';
        const response = await fetch(`/api/magnets/${encodeURIComponent(magnetId)}`, { cache: 'no-store' });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(payload.error || '磁链无效或已过期');
        inlineDownloaderTitle.textContent = `磁链下载：${payload.asset?.name || magnetId}`;
        inlineDownloaderFrame.src = `/downloader?embedded=1&magnet=${encodeURIComponent(magnetId)}`;
    }

    inlineDownloaderMinimize.addEventListener('click', () => {
        inlineDownloader.classList.toggle('minimized');
        inlineDownloaderMinimize.textContent = inlineDownloader.classList.contains('minimized') ? '+' : '-';
    });

    inlineDownloaderClose.addEventListener('click', () => {
        inlineDownloader.classList.remove('open', 'minimized');
        inlineDownloaderFrame.removeAttribute('src');
        inlineDownloaderMinimize.textContent = '-';
    });

    magnetLoadForm.addEventListener('submit', event => {
        event.preventDefault();
        const magnetId = normalizeMagnetInput(magnetIdInput.value);
        if (!/^[a-zA-Z0-9_-]{12,64}$/.test(magnetId)) {
            alert('请输入有效的磁链ID或完整磁链地址');
            return;
        }
        openInlineDownloader(magnetId).catch(err => {
            inlineDownloader.classList.remove('open', 'minimized');
            alert(`磁链校验失败：${err.message}`);
        });
    });

    function formatSize(bytes) {
        if (!bytes) return '0 B';
        const units = ['B', 'KB', 'MB', 'GB'];
        const index = Math.min(units.length - 1, Math.floor(Math.log(bytes) / Math.log(1024)));
        return `${(bytes / Math.pow(1024, index)).toFixed(index ? 2 : 0)} ${units[index]}`;
    }

    function dataSize(data) {
        if (!data) return 0;
        if (data instanceof ArrayBuffer) return data.byteLength;
        if (ArrayBuffer.isView(data)) return data.byteLength;
        if (data instanceof Blob) return data.size;
        return 0;
    }

    function openDb() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            request.onupgradeneeded = event => {
                const db = event.target.result;
                if (!db.objectStoreNames.contains(STORE_NAME)) {
                    const store = db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    store.createIndex('updatedAt', 'updatedAt');
                    store.createIndex('magnetId', 'magnetId');
                }
            };
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error || new Error('无法打开缓存数据库'));
        });
    }

    function requestToPromise(request) {
        return new Promise((resolve, reject) => {
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error || new Error('IndexedDB 请求失败'));
        });
    }

    async function withStore(mode, callback) {
        const db = await openDb();
        try {
            return await new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], mode);
                const store = transaction.objectStore(STORE_NAME);
                let result;
                transaction.oncomplete = () => resolve(result);
                transaction.onerror = () => reject(transaction.error || new Error('缓存操作失败'));
                transaction.onabort = () => reject(transaction.error || new Error('缓存操作中断'));
                try {
                    Promise.resolve(callback(store)).then(value => {
                        result = value;
                    }, reject);
                } catch (err) {
                    reject(err);
                }
            });
        } finally {
            db.close();
        }
    }

    async function getAllFiles() {
        return withStore('readonly', store => requestToPromise(store.getAll()));
    }

    async function deleteFile(id) {
        await withStore('readwrite', store => requestToPromise(store.delete(id)));
    }

    function triggerDownload(file) {
        const blob = new Blob([file.data], { type: file.type || 'application/octet-stream' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = file.name || 'download';
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    async function copyText(text) {
        if (navigator.clipboard?.writeText && window.isSecureContext) {
            await navigator.clipboard.writeText(text);
            return;
        }
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.readOnly = true;
        textarea.style.cssText = 'position:fixed;left:-9999px;top:0;opacity:0;';
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();
        const copied = document.execCommand('copy');
        textarea.remove();
        if (!copied) throw new Error('复制失败');
    }

    async function copyMagnet(file) {
        const url = file.magnetUrl || (file.magnetId ? `${location.origin}/magnet/${file.magnetId}` : '');
        if (!url) {
            alert('这个缓存没有对应的磁链记录');
            return;
        }
        try {
            await copyText(url);
            alert('磁链已复制');
        } catch (err) {
            window.prompt('请手动复制磁链', url);
        }
    }

    async function render() {
        const files = (await getAllFiles())
            .filter(file => dataSize(file.data) > 0)
            .sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));

        if (!files.length) {
            list.innerHTML = '<div class="empty">暂无磁链文件缓存</div>';
            return;
        }

        list.replaceChildren(...files.map(file => {
            const item = document.createElement('div');
            item.className = 'item';

            const info = document.createElement('div');
            const name = document.createElement('div');
            name.className = 'name';
            name.textContent = file.name || file.id;
            const meta = document.createElement('div');
            meta.className = 'meta';
            meta.textContent = `大小：${formatSize(file.size || dataSize(file.data))} · 类型：${file.type || 'application/octet-stream'} · 缓存时间：${new Date(file.updatedAt || Date.now()).toLocaleString('zh-CN')}`;
            const source = document.createElement('div');
            source.className = 'meta';
            source.textContent = `磁链：${file.magnetId || '-'} · 隧道：${file.sourceSessionId || '-'}`;
            info.append(name, meta, source);

            const actions = document.createElement('div');
            actions.className = 'actions';
            const download = document.createElement('button');
            download.textContent = '下载';
            download.onclick = () => triggerDownload(file);
            const copy = document.createElement('button');
            copy.className = 'secondary';
            copy.textContent = '复制磁链';
            copy.onclick = () => copyMagnet(file);
            const remove = document.createElement('button');
            remove.className = 'secondary';
            remove.textContent = '删除';
            remove.onclick = async () => {
                if (!confirm(`删除本机缓存：${file.name || file.id}？`)) return;
                await deleteFile(file.id);
                await render();
            };
            actions.append(download, copy, remove);

            item.append(info, actions);
            return item;
        }));
    }

    render().catch(err => {
        list.innerHTML = `<div class="empty">读取缓存失败：${err.message}</div>`;
    });
})();
</script>
</body>
</html>
