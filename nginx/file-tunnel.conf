# Include this file from Nginx's http {} block.
# Cloudflare can terminate public HTTPS and proxy HTTP to this server block.
# 先在韩国机器上，直接部署80端口，靠cloudflare CDN宽松的TLS回源策略将流量经由80端口
# 以后有空再迁移到别的机器上，采用这个nginx配置

upstream file_tunnel_node {
    server 127.0.0.1:3000;
    keepalive 32;
}

map $http_upgrade $file_tunnel_connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    listen [::]:80;
    # Add local IPs here when testing the Nginx route from a LAN browser.
    server_name tun.miku.us 10.0.0.16 10.0.0.40;

    # Socket.IO needs HTTP/1.1 upgrade support and long-lived reads.
    location /socket.io/ {
        proxy_pass http://file_tunnel_node;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $file_tunnel_connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://file_tunnel_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }
}
