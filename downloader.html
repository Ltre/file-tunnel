<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>磁链下载</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #f4f6fb;
            color: #24304a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        main {
            width: min(92vw, 620px);
            padding: 28px;
            border: 1px solid #dfe5f1;
            border-radius: 10px;
            background: #fff;
            box-shadow: 0 18px 45px rgba(31, 45, 77, 0.12);
        }
        h1 { margin: 0 0 18px; font-size: 1.35rem; }
        .meta {
            display: grid;
            gap: 8px;
            margin-bottom: 22px;
            color: #61708d;
            font-size: 0.92rem;
            word-break: break-all;
        }
        .progress {
            height: 12px;
            overflow: hidden;
            border-radius: 999px;
            background: #edf1f7;
        }
        .bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #667eea, #3dbf93);
            transition: width 0.25s ease;
        }
        .status {
            min-height: 1.5em;
            margin: 12px 0 20px;
            color: #3f4e6b;
            font-size: 0.92rem;
        }
        button {
            min-height: 42px;
            padding: 0 18px;
            border: 0;
            border-radius: 8px;
            background: #667eea;
            color: #fff;
            cursor: pointer;
            font-weight: 700;
        }
        button:disabled { cursor: not-allowed; opacity: 0.55; }
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .link-button {
            min-height: 42px;
            padding: 0 18px;
            border-radius: 8px;
            background: #edf1f7;
            color: #36445f;
            cursor: pointer;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }
        .cache-overlay {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: none;
            background: rgba(20, 28, 43, 0.46);
            padding: 20px;
        }
        .cache-overlay.open {
            display: grid;
            place-items: center;
        }
        .cache-panel {
            width: min(96vw, 980px);
            height: min(88vh, 720px);
            border-radius: 12px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 24px 70px rgba(21, 30, 51, 0.28);
            display: grid;
            grid-template-rows: auto 1fr;
        }
        .cache-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 14px;
            border-bottom: 1px solid #e4e9f3;
        }
        .cache-panel-title {
            font-weight: 800;
        }
        .cache-panel iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>
<body>
<main>
    <h1>磁链下载</h1>
    <div class="meta" id="meta">正在读取磁链...</div>
    <div class="progress"><div class="bar" id="bar"></div></div>
    <div class="status" id="status">等待开始</div>
    <div class="actions">
        <button id="downloadBtn" disabled>下载文件</button>
        <button class="link-button" id="cacheListBtn" type="button">缓存列表</button>
    </div>
</main>
<div class="cache-overlay" id="cacheOverlay" aria-hidden="true">
    <div class="cache-panel" role="dialog" aria-modal="true" aria-label="磁链缓存列表">
        <div class="cache-panel-header">
            <div class="cache-panel-title">磁链缓存列表</div>
            <button id="cacheOverlayClose" type="button">关闭</button>
        </div>
        <iframe id="cacheListFrame" title="磁链缓存列表"></iframe>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/client/file-assets.js"></script>
<script>
(() => {
    const meta = document.getElementById('meta');
    const status = document.getElementById('status');
    const bar = document.getElementById('bar');
    const downloadBtn = document.getElementById('downloadBtn');
    const cacheListBtn = document.getElementById('cacheListBtn');
    const cacheOverlay = document.getElementById('cacheOverlay');
    const cacheOverlayClose = document.getElementById('cacheOverlayClose');
    const cacheListFrame = document.getElementById('cacheListFrame');
    const DB_NAME = 'TunnelDownloaderDB';
    const DB_VERSION = 1;
    const STORE_NAME = 'magnetFiles';
    const TUNNEL_DB_NAME = 'TunnelDB';
    let magnet = null;
    let socket = null;
    let transfer = null;
    let seedRefreshTimer = null;

    function setStatus(text) {
        status.textContent = text;
    }

    function formatSize(bytes) {
        if (!bytes) return '0 B';
        const units = ['B', 'KB', 'MB', 'GB'];
        const index = Math.min(units.length - 1, Math.floor(Math.log(bytes) / Math.log(1024)));
        return `${(bytes / Math.pow(1024, index)).toFixed(index ? 2 : 0)} ${units[index]}`;
    }

    function createUuid() {
        if (crypto.randomUUID) return crypto.randomUUID();
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, char => {
            const value = Math.random() * 16 | 0;
            return (char === 'x' ? value : (value & 0x3 | 0x8)).toString(16);
        });
    }

    function deviceId() {
        const key = 'tunnel_downloader_device_id';
        let id = localStorage.getItem(key);
        if (!id) {
            id = createUuid();
            localStorage.setItem(key, id);
        }
        return id;
    }

    function dataSize(data) {
        if (!data) return 0;
        if (data instanceof ArrayBuffer) return data.byteLength;
        if (ArrayBuffer.isView(data)) return data.byteLength;
        if (data instanceof Blob) return data.size;
        return 0;
    }

    function hasCompleteCache(file, asset) {
        const size = dataSize(file?.data);
        const expectedSize = Number(asset?.size ?? file?.size);
        return size > 0 && (!Number.isFinite(expectedSize) || expectedSize <= 0 || size === expectedSize);
    }

    function openCacheOverlay() {
        cacheListFrame.src = `/downloadList?embedded=1&magnet=${encodeURIComponent(magnet?.id || '')}`;
        cacheOverlay.classList.add('open');
        cacheOverlay.setAttribute('aria-hidden', 'false');
    }

    function closeCacheOverlay() {
        cacheOverlay.classList.remove('open');
        cacheOverlay.setAttribute('aria-hidden', 'true');
    }

    function openDb() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            request.onupgradeneeded = event => {
                const db = event.target.result;
                if (!db.objectStoreNames.contains(STORE_NAME)) {
                    const store = db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    store.createIndex('updatedAt', 'updatedAt');
                    store.createIndex('magnetId', 'magnetId');
                }
            };
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error || new Error('无法打开下载缓存'));
        });
    }

    function requestToPromise(request) {
        return new Promise((resolve, reject) => {
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error || new Error('IndexedDB 请求失败'));
        });
    }

    async function withFileStore(mode, callback) {
        const db = await openDb();
        try {
            return await new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], mode);
                const store = transaction.objectStore(STORE_NAME);
                let result;
                transaction.oncomplete = () => resolve(result);
                transaction.onerror = () => reject(transaction.error || new Error('缓存操作失败'));
                transaction.onabort = () => reject(transaction.error || new Error('缓存操作中断'));
                try {
                    Promise.resolve(callback(store)).then(value => {
                        result = value;
                    }, reject);
                } catch (err) {
                    reject(err);
                }
            });
        } finally {
            db.close();
        }
    }

    async function loadCachedFile(fileId) {
        return withFileStore('readonly', store => requestToPromise(store.get(fileId)));
    }

    async function storeCachedFile(file) {
        const record = {
            ...file,
            magnetId: magnet?.id || '',
            magnetUrl: location.href,
            sourceSessionId: magnet?.sessionId || file.sessionId || '',
            updatedAt: Date.now(),
            cachedBy: deviceId()
        };
        await withFileStore('readwrite', store => requestToPromise(store.put(record)));
    }

    function openTunnelDb() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(TUNNEL_DB_NAME);
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error || new Error('无法打开隧道本地缓存'));
        });
    }

    async function loadTunnelCachedFile(fileId, sessionId) {
        const db = await openTunnelDb();
        try {
            if (!db.objectStoreNames.contains('files')) return null;
            const file = await new Promise((resolve, reject) => {
                const transaction = db.transaction(['files'], 'readonly');
                const request = transaction.objectStore('files').get(fileId);
                request.onsuccess = () => resolve(request.result || null);
                request.onerror = () => reject(request.error || new Error('读取隧道缓存失败'));
            });
            return file && file.sessionId === sessionId ? file : null;
        } finally {
            db.close();
        }
    }

    function mergeSeedDevices(payload) {
        const seedKey = `tunnel_magnet_seeds_${payload.id}`;
        const serverSeeds = Array.isArray(payload.seedDevices) ? payload.seedDevices : [];
        const localSeeds = JSON.parse(localStorage.getItem(seedKey) || '[]').filter(seed => seed && seed.deviceId);
        const merged = new Map();
        localSeeds.forEach(seed => merged.set(seed.deviceId, seed));
        serverSeeds.forEach(seed => merged.set(seed.deviceId, seed));
        payload.seedDevices = Array.from(merged.values());
        localStorage.setItem(seedKey, JSON.stringify(payload.seedDevices));
        return payload;
    }

    async function loadMagnet() {
        const magnetId = new URLSearchParams(location.search).get('magnet');
        if (!magnetId) throw new Error('缺少磁链 ID');
        const response = await fetch(`/api/magnets/${encodeURIComponent(magnetId)}`);
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(payload.error || '磁链不存在或已过期');

        return mergeSeedDevices(payload);
    }

    function renderMeta() {
        const seedCount = Array.isArray(magnet.seedDevices) ? magnet.seedDevices.length : 0;
        meta.replaceChildren(
            Object.assign(document.createElement('div'), { textContent: `文件：${magnet.asset.name}` }),
            Object.assign(document.createElement('div'), { textContent: `大小：${formatSize(magnet.asset.size)}` }),
            Object.assign(document.createElement('div'), { textContent: `种子设备：${seedCount} 台在线` })
        );
    }

    function stopSeedRefresh() {
        if (seedRefreshTimer) clearInterval(seedRefreshTimer);
        seedRefreshTimer = null;
    }

    function startSeedRefresh() {
        stopSeedRefresh();
        seedRefreshTimer = setInterval(async () => {
            if (!magnet?.id) return;
            try {
                const response = await fetch(`/api/magnets/${encodeURIComponent(magnet.id)}`, { cache: 'no-store' });
                if (!response.ok) return;
                const next = mergeSeedDevices(await response.json());
                magnet = {
                    ...magnet,
                    ...next,
                    asset: next.asset || magnet.asset
                };
                renderMeta();
                if (transfer && socket?.connected && downloadBtn.disabled) {
                    transfer.handleManifest({
                        asset: magnet.asset,
                        providers: (magnet.seedDevices || []).map(seed => seed.deviceId).filter(Boolean)
                    });
                }
            } catch (err) {
                console.warn('Failed to refresh magnet seeds:', err);
            }
        }, 5000);
    }

    function triggerDownload(file) {
        const blob = new Blob([file.data], { type: file.type || 'application/octet-stream' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = file.name || magnet?.asset?.name || 'download';
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        setStatus('已触发下载。浏览器无法可靠确认文件是否保存成功，缓存会保留，可到“缓存列表”手动删除。');
    }

    function enableDownload(file, label = '已缓存到本机') {
        stopSeedRefresh();
        bar.style.width = '100%';
        setStatus(label);
        downloadBtn.disabled = false;
        downloadBtn.onclick = () => triggerDownload(file);
    }

    function initTransfer() {
        transfer = new window.FileAssetTransfer({
            getSocket: () => socket,
            getSessionId: () => magnet.sessionId,
            getPeer: () => null,
            connectPeer: async () => { throw new Error('Downloader uses relay first'); },
            waitForDataChannel: async () => false,
            load: loadCachedFile,
            store: storeCachedFile,
            log: () => {},
            onProgress: (fileId, fileName, progress, transport) => {
                bar.style.width = `${Math.max(0, Math.min(100, progress))}%`;
                const route = String(transport || '').includes('multi-source') ? '多源分片' : '中继/直连';
                setStatus(`正在获取文件 ${progress}% · ${route}`);
            },
            onReceived: async file => {
                await storeCachedFile(file);
                enableDownload(file);
            },
            onUnavailable: (fileId, reason) => {
                setStatus(`暂时没有可用种子或传输中断：${reason || 'unknown'}`);
            }
        });

        socket.on('file-asset-manifest', data => transfer.handleManifest(data));
        socket.on('file-asset-unavailable', data => transfer.handleUnavailable(data));
        socket.on('file-asset-available', data => transfer.handleAvailable(data));
        socket.on('file-asset-relay-start', data => transfer.handleRelayStart(data));
        socket.on('file-asset-relay-chunk', data => transfer.handleRelayChunk(data));
        socket.on('file-asset-relay-complete', data => transfer.handleRelayComplete(data));
    }

    async function start() {
        magnet = await loadMagnet();
        renderMeta();
        cacheListBtn.addEventListener('click', openCacheOverlay);
        cacheOverlayClose.addEventListener('click', closeCacheOverlay);
        cacheOverlay.addEventListener('click', event => {
            if (event.target === cacheOverlay) closeCacheOverlay();
        });
        window.addEventListener('beforeunload', stopSeedRefresh);

        const cached = await loadCachedFile(magnet.asset.id);
        if (hasCompleteCache(cached, magnet.asset)) {
            enableDownload(cached, '已命中本地缓存，可直接下载');
            return;
        }

        const tunnelCached = await loadTunnelCachedFile(magnet.asset.id, magnet.sessionId).catch(() => null);
        if (hasCompleteCache(tunnelCached, magnet.asset)) {
            setStatus('本地快速提取中...');
            await storeCachedFile({
                ...tunnelCached,
                ...magnet.asset,
                id: magnet.asset.id,
                data: tunnelCached.data,
                sessionId: magnet.sessionId
            });
            const copied = await loadCachedFile(magnet.asset.id);
            enableDownload(copied || tunnelCached, '已缓存到本机');
            return;
        }

        startSeedRefresh();
        socket = io(location.origin);
        initTransfer();

        socket.on('connect', () => {
            setStatus('已连接服务器，正在加入种子隧道...');
            socket.emit('join-session', {
                sessionId: magnet.sessionId,
                deviceId: deviceId(),
                deviceName: '磁链下载器',
                deviceModel: navigator.userAgent.slice(0, 80)
            });
        });
        socket.once('session-history', async () => {
            const seed = (magnet.seedDevices || [])[0];
            setStatus('正在寻找种子设备...');
            await transfer.request(magnet.asset.id, seed && seed.deviceId, magnet.asset, { force: true });
        });
        socket.on('connect_error', err => setStatus(`连接失败：${err.message}`));
        socket.on('error', err => setStatus(`服务端错误：${err && err.message || 'unknown'}`));
    }

    start().catch(err => {
        meta.textContent = '磁链加载失败';
        setStatus(err.message);
    });
})();
</script>
</body>
</html>
