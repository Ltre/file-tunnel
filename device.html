<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>设备主页</title>
    <script defer src="/client/qrcode-1.0.0.min.js"></script>
    <script defer src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background: #f4f6fb;
            color: #24304a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        main {
            width: min(92vw, 720px);
            margin: 0 auto;
            padding: 34px 0 46px;
        }
        .card {
            border: 1px solid #dfe5f1;
            border-radius: 12px;
            background: #fff;
            box-shadow: 0 18px 44px rgba(31, 45, 77, 0.12);
            overflow: hidden;
        }
        header {
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 22px;
            border-bottom: 1px solid #e6ebf3;
            background: linear-gradient(135deg, #2f405e 0%, #52627f 100%);
            color: #fff;
        }
        .header-copy {
            min-width: 0;
        }
        .device-logo {
            display: inline-grid;
            width: 38px;
            height: 38px;
            place-items: center;
            margin-bottom: 8px;
            border-radius: 10px;
            background: rgba(255,255,255,.14);
            font-size: 1.35rem;
        }
        h1 {
            margin: 0 0 6px;
            font-size: clamp(1.45rem, 4vw, 2.05rem);
            letter-spacing: 0;
        }
        .subtitle {
            color: rgba(255, 255, 255, 0.82);
            word-break: break-all;
        }
        .content {
            display: grid;
            grid-template-columns: 176px minmax(0, 1fr);
            gap: 20px;
            padding: 22px;
        }
        .qr {
            display: grid;
            flex: 0 0 auto;
            width: 132px;
            min-height: 132px;
            place-items: center;
            border: 1px solid #dfe5f1;
            border-radius: 10px;
            background: #fff;
            color: #69758d;
        }
        .quick-actions {
            display: grid;
            gap: 12px;
        }
        .quick-actions button {
            display: grid;
            min-height: 96px;
            place-items: center;
            gap: 6px;
            padding: 12px;
            border: 1px solid #dfe5f1;
            border-radius: 10px;
            background: #f8fafd;
            color: #26324a;
            box-shadow: none;
        }
        .quick-actions .action-icon {
            font-size: 1.75rem;
            line-height: 1;
        }
        .fields {
            display: grid;
            gap: 10px;
            min-width: 0;
        }
        .field {
            display: grid;
            gap: 4px;
            padding: 10px 12px;
            border: 1px solid #edf1f7;
            border-radius: 8px;
            background: #f8fafd;
        }
        .label {
            color: #65708a;
            font-size: 0.78rem;
            font-weight: 700;
        }
        .value {
            color: #24304a;
            word-break: break-all;
        }
        .status {
            display: inline-flex;
            width: fit-content;
            align-items: center;
            gap: 6px;
            padding: 4px 9px;
            border-radius: 999px;
            background: #eef2ff;
            color: #3341a4;
            font-size: 0.82rem;
            font-weight: 800;
        }
        .status.online {
            background: #e9f8ef;
            color: #1f7a3d;
        }
        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            padding: 0 22px 22px;
        }
        a, button {
            min-height: 40px;
            padding: 0 15px;
            border: 0;
            border-radius: 8px;
            background: #4f5ec2;
            color: #fff;
            cursor: pointer;
            font-weight: 800;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        button.secondary, a.secondary {
            background: #edf1f7;
            color: #36445f;
        }
        .notice {
            margin-top: 14px;
            color: #69758d;
            line-height: 1.6;
        }
        .error {
            padding: 22px;
            color: #a13f3f;
        }
        .toast {
            position: fixed;
            right: 18px;
            bottom: 18px;
            z-index: 1000;
            max-width: min(360px, calc(100vw - 36px));
            padding: 11px 14px;
            border: 1px solid #dfe5f1;
            border-radius: 10px;
            background: rgba(36, 48, 74, 0.94);
            color: #fff;
            box-shadow: 0 12px 32px rgba(31, 45, 77, 0.22);
            font-size: 0.92rem;
            line-height: 1.5;
        }
        .toast.info {
            background: rgba(79, 94, 194, 0.96);
        }
        @media (max-width: 640px) {
            header {
                align-items: flex-start;
                gap: 12px;
            }
            .qr {
                width: 96px;
                min-height: 96px;
            }
            .content {
                grid-template-columns: 1fr;
            }
            .actions a,
            .actions button {
                flex: 1 1 160px;
            }
        }
    </style>
</head>
<body>
<main>
    <section class="card">
        <header>
            <div class="qr" id="profileQr">QR</div>
            <div class="header-copy">
                <!-- <div class="device-logo" aria-hidden="true">📱</div> --> <!-- 为何注释这行？因为多余，下方的设备名称左侧也自带logo -->
                <h1 id="deviceName">设备主页</h1>
                <div class="subtitle" id="deviceIdText">正在加载设备资料...</div>
            </div>
        </header>
        <div class="content" id="profileContent">
            <div class="quick-actions">
                <button type="button" id="profileVoiceBtn"><span class="action-icon">☎</span><span>语音通话</span></button>
                <button type="button" id="profileIntercomBtn"><span class="action-icon">📢</span><span>对讲机</span></button>
                <button type="button" id="profileTunnelBtn"><span class="action-icon">⇄</span><span>开始隧道传输</span></button>
            </div>
            <div class="fields" id="profileFields"></div>
        </div>
        <div class="actions" id="profileActions">
            <a class="secondary" href="/">返回首页</a>
            <button class="secondary" type="button" id="copyProfileBtn">复制设备链接</button>
        </div>
    </section>
    <p class="notice">设备主页只展示连接所需的基础资料，不存储或展示设备中的文件内容。</p>
</main>
<script>
    const deviceId = decodeURIComponent(location.pathname.split('/').filter(Boolean).pop() || '');
    const fields = document.getElementById('profileFields');
    const actions = document.getElementById('profileActions');
    const qr = document.getElementById('profileQr');
    let currentDeviceProfile = null;
    let inviteSocket = null;
    let toastTimer = null;
    const pendingIncomingInvites = new Map();

    function showToast(message, type = '') {
        document.getElementById('devicePageToast')?.remove();
        clearTimeout(toastTimer);
        const toast = document.createElement('div');
        toast.id = 'devicePageToast';
        toast.className = `toast ${type}`.trim();
        toast.textContent = message;
        document.body.appendChild(toast);
        toastTimer = setTimeout(() => toast.remove(), 2400);
    }

    function generateId() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
            const r = Math.random() * 16 | 0;
            const v = c === 'x' ? r : (r & 0x3 | 0x8);
            return v.toString(16);
        });
    }

    function getSelfDeviceId() {
        let selfId = localStorage.getItem('deviceId');
        if (!/^[0-9a-f-]{36}$/i.test(selfId || '')) {
            selfId = generateId();
            localStorage.setItem('deviceId', selfId);
        }
        return selfId;
    }

    function getSelfDeviceName() {
        const selfId = getSelfDeviceId();
        return localStorage.getItem('deviceName') || `设备-${selfId.slice(-4)}`;
    }

    function getQueuedTunnelInvites() {
        try {
            const parsed = JSON.parse(localStorage.getItem('deviceTunnelInviteQueue') || '[]');
            return Array.isArray(parsed) ? parsed : [];
        } catch {
            return [];
        }
    }

    function queueTunnelInvite(invite) {
        const queued = getQueuedTunnelInvites().filter(item => item.invitationId !== invite.invitationId);
        queued.push(invite);
        localStorage.setItem('deviceTunnelInviteQueue', JSON.stringify(queued.slice(-50)));
    }

    function getDirectTunnelSessionId(targetDeviceId) {
        const key = 'directTunnelPool';
        let pool = {};
        try {
            pool = JSON.parse(localStorage.getItem(key) || '{}') || {};
        } catch {
            pool = {};
        }
        let sessionId = pool[targetDeviceId];
        if (!/^[a-zA-Z0-9_-]{8,64}$/.test(sessionId || '')) {
            sessionId = generateId();
            pool[targetDeviceId] = sessionId;
            localStorage.setItem(key, JSON.stringify(pool));
        }
        return sessionId;
    }

    function connectInviteSocket() {
        if (inviteSocket || !window.io) return inviteSocket;
        inviteSocket = io(window.location.origin, { transports: ['websocket', 'polling'] });
        inviteSocket.on('connect', () => {
            inviteSocket.emit('register-profile-device', {
                deviceId: getSelfDeviceId(),
                deviceName: getSelfDeviceName()
            });
        });
        inviteSocket.on('device-tunnel-invite-ack', data => {
            if (data?.accepted === false) alert('对方拒绝了隧道邀请');
        });
        inviteSocket.on('device-tunnel-invite', handleIncomingTunnelInvite);
        return inviteSocket;
    }

    function getInviteSenderName(invite) {
        return invite?.sender?.name || invite?.sender?.deviceName || invite?.from?.slice(0, 8) || '对方设备';
    }

    function sendInviteAck(invite, accepted) {
        inviteSocket?.emit('device-tunnel-invite-ack', {
            invitationId: invite.invitationId,
            from: getSelfDeviceId(),
            to: invite.from,
            sessionId: invite.sessionId,
            accepted,
            link: invite.link
        });
    }

    function acceptIncomingInvite(invite) {
        pendingIncomingInvites.delete(invite.invitationId);
        sendInviteAck(invite, true);
        window.location.href = invite.link;
    }

    function promptIncomingInvite(invite) {
        const accepted = confirm(`${getInviteSenderName(invite)} 邀请你开始一个传输隧道，是否进入？`);
        if (accepted) acceptIncomingInvite(invite);
        else {
            pendingIncomingInvites.delete(invite.invitationId);
            sendInviteAck(invite, false);
        }
    }

    async function showInviteNotification(invite) {
        if (!('Notification' in window) || Notification.permission !== 'granted') return false;
        const title = '传输隧道邀请';
        const options = {
            body: `${getInviteSenderName(invite)} 想和你建立一个传输隧道`,
            tag: `device-tunnel-invite-${invite.invitationId}`,
            renotify: true,
            requireInteraction: true,
            icon: '/tunnel-icon.svg',
            badge: '/tunnel-icon.svg',
            data: { url: invite.link, invitationId: invite.invitationId }
        };
        try {
            if (navigator.serviceWorker?.ready) {
                const registration = await navigator.serviceWorker.ready;
                await registration.showNotification(title, options);
                return true;
            }
        } catch {
            // Fall through to the page notification API.
        }
        try {
            const notification = new Notification(title, options);
            notification.onclick = () => {
                window.focus();
                acceptIncomingInvite(invite);
                notification.close();
            };
            return true;
        } catch {
            return false;
        }
    }

    async function handleIncomingTunnelInvite(invite) {
        if (!invite?.link || !invite?.from || !invite?.invitationId) return;
        if (document.hidden) {
            pendingIncomingInvites.set(invite.invitationId, invite);
            const notified = await showInviteNotification(invite);
            if (notified) return;
        }
        promptIncomingInvite(invite);
    }

    document.addEventListener('visibilitychange', () => {
        if (document.hidden || pendingIncomingInvites.size === 0) return;
        const invite = pendingIncomingInvites.values().next().value;
        if (invite) promptIncomingInvite(invite);
    });

    function emitInvite(socket, invite) {
        return new Promise(resolve => {
            if (!socket?.connected) return resolve({ ok: false, delivered: false });
            socket.emit('device-tunnel-invite', invite, response => resolve(response || { ok: false, delivered: false }));
            setTimeout(() => resolve({ ok: false, delivered: false, timeout: true }), 1200);
        });
    }

    function waitForInviteSocket(socket, timeout = 1000) {
        return new Promise(resolve => {
            if (!socket) return resolve(null);
            if (socket.connected) return resolve(socket);
            const timer = setTimeout(() => {
                socket.off?.('connect', onConnect);
                resolve(socket);
            }, timeout);
            function onConnect() {
                clearTimeout(timer);
                resolve(socket);
            }
            socket.once('connect', onConnect);
        });
    }

    async function startTunnelTransfer() {
        const target = currentDeviceProfile;
        if (!target?.deviceId) return;
        const from = getSelfDeviceId();
        if (from === target.deviceId) {
            alert('这是本机设备主页，不需要发起设备间隧道。');
            return;
        }
        const sessionId = getDirectTunnelSessionId(target.deviceId);
        const invitationId = generateId();
        const link = `${window.location.origin}/?open=1&invite=${encodeURIComponent(invitationId)}&from=${encodeURIComponent(from)}#${sessionId}`;
        const invite = {
            invitationId,
            from,
            to: target.deviceId,
            sessionId,
            link,
            sender: {
                deviceId: from,
                name: getSelfDeviceName(),
                profileUrl: `${window.location.origin}/device/${encodeURIComponent(from)}`
            },
            createdAt: Date.now()
        };
        const button = document.getElementById('profileTunnelBtn');
        if (button) {
            button.disabled = true;
            button.querySelector('span:last-child').textContent = '正在准备隧道...';
        }
        showToast('正在准备传输隧道...', 'info');
        const socket = await waitForInviteSocket(connectInviteSocket());
        const response = socket?.connected ? await emitInvite(socket, invite) : { ok: false, delivered: false };
        if (!response?.delivered) {
            queueTunnelInvite(invite);
            showToast('对方暂时不在线，已加入本机待发送队列。');
        } else {
            showToast('邀请已推送，正在进入隧道。', 'info');
        }
        setTimeout(() => { window.location.href = link; }, 650);
    }

    function formatTime(value) {
        const timestamp = Number(value);
        if (!timestamp) return '-';
        return new Date(timestamp).toLocaleString('zh-CN');
    }

    function addField(label, value) {
        const item = document.createElement('div');
        item.className = 'field';
        const labelEl = document.createElement('div');
        labelEl.className = 'label';
        labelEl.textContent = label;
        const valueEl = document.createElement('div');
        valueEl.className = 'value';
        valueEl.textContent = value || '-';
        item.append(labelEl, valueEl);
        fields.appendChild(item);
    }

    function renderProfile(device) {
        currentDeviceProfile = device;
        document.title = `${device.deviceName || '设备'} - 设备主页`;
        document.getElementById('deviceName').textContent = device.deviceName || '未命名设备';
        document.getElementById('deviceIdText').textContent = device.deviceId;
        fields.innerHTML = '';
        addField('在线状态', device.online ? '在线' : '离线');
        addField('活跃状态', device.active ? '活跃' : '不活跃');
        addField('设备型号', device.deviceModel);
        addField('内网 IP', device.localIp);
        addField('外网 IP', device.externalIp || device.ip);
        addField('首次访问', formatTime(device.firstSeen));
        addField('最后访问', formatTime(device.lastAccess));
        addField('浏览器', device.userAgent);

        qr.innerHTML = '';
        if (window.QRCode && device.profileUrl) {
            new QRCode(qr, { text: device.profileUrl, width: 132, height: 132, correctLevel: QRCode.CorrectLevel.M });
        } else {
            qr.textContent = 'QR';
        }

        document.getElementById('copyProfileBtn').onclick = async () => {
            const link = device.profileUrl || location.href;
            try {
                await navigator.clipboard.writeText(link);
                showToast('已复制设备链接', 'info');
            } catch {
                prompt('复制设备链接', link);
            }
        };
        document.getElementById('profileVoiceBtn').onclick = () => alert('语音通话请先在功能首页关注设备后发起。');
        document.getElementById('profileIntercomBtn').onclick = () => alert('对讲机请先在功能首页关注设备后发起。');
        document.getElementById('profileTunnelBtn').onclick = startTunnelTransfer;
        connectInviteSocket();
    }

    function renderError(message) {
        document.getElementById('profileContent').innerHTML = `<div class="error">${message}</div>`;
    }

    fetch(`/api/devices/${encodeURIComponent(deviceId)}`, { cache: 'no-store' })
        .then(response => response.ok ? response.json() : Promise.reject(new Error(response.status === 404 ? '未找到这个设备' : '设备资料加载失败')))
        .then(data => renderProfile(data.device))
        .catch(err => renderError(err.message));
</script>
</body>
</html>
