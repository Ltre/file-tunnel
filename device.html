<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>设备主页</title>
    <script defer src="/client/qrcode-1.0.0.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background: #f4f6fb;
            color: #24304a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        main {
            width: min(92vw, 720px);
            margin: 0 auto;
            padding: 34px 0 46px;
        }
        .card {
            border: 1px solid #dfe5f1;
            border-radius: 12px;
            background: #fff;
            box-shadow: 0 18px 44px rgba(31, 45, 77, 0.12);
            overflow: hidden;
        }
        header {
            padding: 22px;
            border-bottom: 1px solid #e6ebf3;
            background: linear-gradient(135deg, #2f405e 0%, #52627f 100%);
            color: #fff;
        }
        h1 {
            margin: 0 0 6px;
            font-size: clamp(1.45rem, 4vw, 2.05rem);
            letter-spacing: 0;
        }
        .subtitle {
            color: rgba(255, 255, 255, 0.82);
            word-break: break-all;
        }
        .content {
            display: grid;
            grid-template-columns: 156px minmax(0, 1fr);
            gap: 20px;
            padding: 22px;
        }
        .qr {
            display: grid;
            width: 156px;
            min-height: 156px;
            place-items: center;
            border: 1px solid #dfe5f1;
            border-radius: 10px;
            background: #fff;
            color: #69758d;
        }
        .fields {
            display: grid;
            gap: 10px;
            min-width: 0;
        }
        .field {
            display: grid;
            gap: 4px;
            padding: 10px 12px;
            border: 1px solid #edf1f7;
            border-radius: 8px;
            background: #f8fafd;
        }
        .label {
            color: #65708a;
            font-size: 0.78rem;
            font-weight: 700;
        }
        .value {
            color: #24304a;
            word-break: break-all;
        }
        .status {
            display: inline-flex;
            width: fit-content;
            align-items: center;
            gap: 6px;
            padding: 4px 9px;
            border-radius: 999px;
            background: #eef2ff;
            color: #3341a4;
            font-size: 0.82rem;
            font-weight: 800;
        }
        .status.online {
            background: #e9f8ef;
            color: #1f7a3d;
        }
        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            padding: 0 22px 22px;
        }
        a, button {
            min-height: 40px;
            padding: 0 15px;
            border: 0;
            border-radius: 8px;
            background: #4f5ec2;
            color: #fff;
            cursor: pointer;
            font-weight: 800;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        button.secondary, a.secondary {
            background: #edf1f7;
            color: #36445f;
        }
        .notice {
            margin-top: 14px;
            color: #69758d;
            line-height: 1.6;
        }
        .error {
            padding: 22px;
            color: #a13f3f;
        }
        @media (max-width: 640px) {
            .content {
                grid-template-columns: 1fr;
            }
            .qr {
                margin: 0 auto;
            }
            .actions a,
            .actions button {
                flex: 1 1 160px;
            }
        }
    </style>
</head>
<body>
<main>
    <section class="card">
        <header>
            <h1 id="deviceName">设备主页</h1>
            <div class="subtitle" id="deviceIdText">正在加载设备资料...</div>
        </header>
        <div class="content" id="profileContent">
            <div class="qr" id="profileQr">QR</div>
            <div class="fields" id="profileFields"></div>
        </div>
        <div class="actions" id="profileActions">
            <a class="secondary" href="/">返回首页</a>
            <button class="secondary" type="button" id="copyProfileBtn">复制主页链接</button>
        </div>
    </section>
    <p class="notice">设备主页只展示连接所需的基础资料，不存储或展示设备中的文件内容。</p>
</main>
<script>
    const deviceId = decodeURIComponent(location.pathname.split('/').filter(Boolean).pop() || '');
    const fields = document.getElementById('profileFields');
    const actions = document.getElementById('profileActions');
    const qr = document.getElementById('profileQr');

    function formatTime(value) {
        const timestamp = Number(value);
        if (!timestamp) return '-';
        return new Date(timestamp).toLocaleString('zh-CN');
    }

    function addField(label, value) {
        const item = document.createElement('div');
        item.className = 'field';
        const labelEl = document.createElement('div');
        labelEl.className = 'label';
        labelEl.textContent = label;
        const valueEl = document.createElement('div');
        valueEl.className = 'value';
        valueEl.textContent = value || '-';
        item.append(labelEl, valueEl);
        fields.appendChild(item);
    }

    function renderProfile(device) {
        document.title = `${device.deviceName || '设备'} - 设备主页`;
        document.getElementById('deviceName').textContent = device.deviceName || '未命名设备';
        document.getElementById('deviceIdText').textContent = device.deviceId;
        fields.innerHTML = '';
        addField('在线状态', device.online ? '在线' : '离线');
        addField('活跃状态', device.active ? '活跃' : '不活跃');
        addField('设备型号', device.deviceModel);
        addField('所在隧道', device.shortCode || device.sessionId);
        addField('内网 IP', device.localIp);
        addField('外网 IP', device.externalIp || device.ip);
        addField('首次访问', formatTime(device.firstSeen));
        addField('最后访问', formatTime(device.lastAccess));
        addField('浏览器', device.userAgent);

        qr.innerHTML = '';
        if (window.QRCode && device.profileUrl) {
            new QRCode(qr, { text: device.profileUrl, width: 132, height: 132, correctLevel: QRCode.CorrectLevel.M });
        } else {
            qr.textContent = 'QR';
        }

        if (device.tunnelUrl) {
            const tunnelLink = document.createElement('a');
            tunnelLink.href = device.tunnelUrl;
            tunnelLink.textContent = '进入所在隧道';
            actions.prepend(tunnelLink);
        }

        document.getElementById('copyProfileBtn').onclick = async () => {
            const link = device.profileUrl || location.href;
            try {
                await navigator.clipboard.writeText(link);
                alert('已复制设备主页链接');
            } catch {
                prompt('复制设备主页链接', link);
            }
        };
    }

    function renderError(message) {
        document.getElementById('profileContent').innerHTML = `<div class="error">${message}</div>`;
    }

    fetch(`/api/devices/${encodeURIComponent(deviceId)}`, { cache: 'no-store' })
        .then(response => response.ok ? response.json() : Promise.reject(new Error(response.status === 404 ? '未找到这个设备' : '设备资料加载失败')))
        .then(data => renderProfile(data.device))
        .catch(err => renderError(err.message));
</script>
</body>
</html>
